<div class="container mt-5">

  <h2>FinPilot Login</h2>

  <input
    [(ngModel)]="username"
    class="form-control mb-3"
    placeholder="Username"
  >

  <input
    [(ngModel)]="password"
    type="password"
    class="form-control mb-3"
    placeholder="Password"
  >

  <button
    class="btn btn-primary"
    (click)="login()"
  >
    Login
  </button>

</div>
