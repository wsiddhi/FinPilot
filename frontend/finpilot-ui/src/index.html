<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FinPilot | Financial Dashboard</title>
  <base href="/">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="FinPilot - Your personal financial management dashboard.">
  
  <!-- Open Graph Meta Tags (for social media sharing) -->
  <meta property="og:title" content="FinPilot">
  <meta property="og:description" content="The ultimate financial management dashboard.">
  <meta property="og:type" content="website">

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Modern Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f7f6;
      color: #333;
      transition: background-color 0.3s ease;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #121212;
        color: #e0e0e0;
      }
    }

    #loader-wrapper {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #ddd;
      border-top: 4px solid #0056b3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- No Script Fallback -->
  <noscript>
    <div style="text-align: center; padding: 50px; font-family: sans-serif;">
      <h2>JavaScript is required</h2>
      <p>Please enable JavaScript to use FinPilot.</p>
    </div>
  </noscript>

  <div id="loader-wrapper">
    <div class="spinner"></div>
  </div>

  <app-root></app-root>

  <script>
    window.addEventListener('load', function() {
      const loader = document.getElementById('loader-wrapper');
      loader.style.display = 'none';
    });
  </script>
</body>
</html>
